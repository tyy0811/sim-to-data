architecture:
  type: cnn_1d
  channels: [32, 64, 128, 128]
  kernels: [7, 5, 3, 3]
  fc_hidden: 128
  dropout: 0.3
  num_classes: 3
  pool_size: 4

training:
  epochs: 80
  batch_size: 128
  learning_rate: 0.001
  weight_decay: 0.0001
  scheduler_patience: 7
  scheduler_factor: 0.5
  early_stopping_patience: 15

finetune:
  epochs: 30
  learning_rate: 0.00005
