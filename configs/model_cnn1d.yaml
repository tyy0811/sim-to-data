architecture:
  type: cnn_1d
  channels: [32, 64, 128]
  kernels: [7, 5, 3]
  fc_hidden: 64
  dropout: 0.3
  num_classes: 3

training:
  epochs: 50
  batch_size: 256
  learning_rate: 0.001
  weight_decay: 0.0001
  scheduler_patience: 5
  scheduler_factor: 0.5
  early_stopping_patience: 10

finetune:
  epochs: 20
  learning_rate: 0.0001
